<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galerie Upload ❤️</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Firebase SDK (Compat Version) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<!-- Zentrale Firebase-Konfiguration -->
<script src="js/firebase-config.js"></script>

</head>

<body class="private-page auth-pending">
	<nav class="navbar">
		<h2>❤️</h2>
		<div class="navbar-actions">
			<button onclick="openTools()">Tools</button>
			<button onclick="openGallery()">Momente</button>
			<button class="logout-btn" onclick="handleLogout()">Abmelden</button>
		</div>
	</nav>

	<main class="upload-page">
		<section class="upload-section">
			<h1>Galerie Upload</h1>
			<p class="gallery-intro">
				Hier kann man Videos/Bilder in unsere Galerie hochladen
			</p>

			<div class="upload-panel">
				<label class="upload-field" for="uploadMonthSelect">
					<span>Zielmonat</span>
					<select id="uploadMonthSelect"></select>
				</label>

				<label class="upload-field" for="galleryMediaInput">
					<span>Fotos oder Videos auswählen</span>
					<input id="galleryMediaInput" type="file" accept="image/*,video/*" multiple>
				</label>

				<label class="upload-field upload-field-desktop" for="galleryFolderInput">
					<span>Monatsordner auswählen (Desktop)</span>
					<input id="galleryFolderInput" type="file" webkitdirectory directory multiple>
				</label>

				<button id="galleryUploadBtn" type="button">Zu Firebase hochladen</button>

				<div id="uploadProgress" class="upload-progress hidden" aria-hidden="true">
					<div id="uploadProgressBar" class="upload-progress-bar"></div>
				</div>

				<p id="uploadStatus" class="upload-status">
					Wähle zuerst den Monat und dann Fotos/Videos oder am Desktop einen Monatsordner aus.
				</p>
			</div>

		</section>
	</main>

	<script src="js/script.js"></script>
</body>

</html>
