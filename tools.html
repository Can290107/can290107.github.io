<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unsere Tools ❤️</title>

<link rel="stylesheet" href="css/style.css">

<!-- Firebase SDK (Compat Version) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

</head>

<body>

<h1>Unsere kleinen Tools ❤️</h1>

<!-- Zurück Button + Logout -->
<button onclick="goBack()">⬅ Zurück</button>
<button onclick="handleLogout()" style="margin-left:10px; background:#db2777;">Abmelden</button>

<!-- Kalender -->
<section>
  <h2>Kalender 📅</h2>

  <div class="calendar">
    <div class="calendar-header">
  <button class="arrow-btn" onclick="changeMonth(-1)">‹</button>
  <h3 id="calendarTitle"></h3>
  <button class="arrow-btn" onclick="changeMonth(1)">›</button>
</div>

    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</section>

<!-- ToDo -->
<section>
  <h2>Unsere Liste ❤️</h2>

  <div class="todo-container">
  <div class="todo-input-row">
    <input type="text" id="todoInput" placeholder="Neue Idee...">
    <button onclick="addTodo()">＋</button>
  </div>

  <ul id="todoList" class="todo-list"></ul>
</div>
</section>

<script>
// 🔐 Einfacher Login Check
const loggedInUser = localStorage.getItem("loggedInUser");

if (!loggedInUser) {
  // Nicht angemeldet → Zurück zur Startseite
  window.location.href = "index.html";
}

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDQTZGjNqoHsjcEJ1W1DHryoXS-xpeOuVI",
  authDomain: "geburtstag-seite.firebaseapp.com",
  projectId: "geburtstag-seite",
  storageBucket: "geburtstag-seite.firebasestorage.app",
  messagingSenderId: "825693028407",
  appId: "1:825693028407:web:55ebde2398f2f9cc907fb2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// GLOBAL machen
window.db = db;
window.firebaseFns = {
  collection: (db, collectionName) => db.collection(collectionName),
  addDoc: (collectionRef, data) => collectionRef.add(data),
  onSnapshot: (query, callback) => query.onSnapshot(callback),
  deleteDoc: (docRef) => docRef.delete(),
  doc: (db, collectionName, docId) => db.collection(collectionName).doc(docId),
  updateDoc: (docRef, data) => docRef.update(data),
  setDoc: (docRef, data) => docRef.set(data)
};

// Logout Funktion
window.handleLogout = function() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "index.html";
};
</script>
</script>

<script>
const script = document.createElement("script");
script.src = "js/script.js";

script.onload = () => {
  console.log("Script geladen ✅");

  if(window.loadTodos){
    loadTodos();
  }

  if(window.loadEvents){
    loadEvents();
  }
};

document.body.appendChild(script);
</script>
<div id="eventPopup" class="event-popup hidden">
  <div class="event-box">
    <p id="eventText"></p>

    <div class="event-actions">
      <button id="editEventBtn">Bearbeiten</button>
      <button id="deleteEventBtn">Löschen</button>
      <button onclick="closePopup()">Schließen</button>
    </div>
  </div>
</div>
</body>
</html>
