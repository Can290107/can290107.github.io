<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unsere Tools ❤️</title>

<link rel="stylesheet" href="css/style.css">

<!-- Firebase SDK (Compat Version) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

</head>

<body>

<nav class="navbar">
  <h2>❤️</h2>
  <div>
    <button onclick="window.goBack ? window.goBack() : window.location.href='index.html'">⬅ Zurück</button>
  </div>
</nav>



<!-- Kalender -->
<section>
  <h2>Kalender 📅</h2>

  <div class="calendar">
    <div class="calendar-header">
  <button class="arrow-btn" onclick="changeMonth(-1)">‹</button>
  <h3 id="calendarTitle"></h3>
  <button class="arrow-btn" onclick="changeMonth(1)">›</button>
</div>

    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</section>

<!-- ToDo -->
<section>
  <h2>Unsere Liste ❤️</h2>

  <div class="todo-container">
  <div class="todo-input-row">
    <input type="text" id="todoInput" placeholder="Neue Idee...">
    <button onclick="addTodo()">＋</button>
  </div>

  <ul id="todoList" class="todo-list"></ul>
</div>
</section>

<script>
// 🔐 Einfacher Login Check
const loggedInUser = localStorage.getItem("loggedInUser");

if (!loggedInUser) {
  // Nicht angemeldet → Zurück zur Startseite
  window.location.href = "index.html";
}

// Firebase nur initialisieren wenn noch nicht passiert
if (!firebase.apps.length) {
  const firebaseConfig = {
    apiKey: "AIzaSyDQTZGjNqoHsjcEJ1W1DHryoXS-xpeOuVI",
    authDomain: "geburtstag-seite.firebaseapp.com",
    projectId: "geburtstag-seite",
    storageBucket: "geburtstag-seite.firebasestorage.app",
    messagingSenderId: "825693028407",
    appId: "1:825693028407:web:55ebde2398f2f9cc907fb2"
  };

  firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();

// GLOBAL machen für script.js
window.db = db;
window.collection = (collectionName) => db.collection(collectionName);
window.addDoc = (collectionRef, data) => collectionRef.add(data);
window.onSnapshot = (query, callback) => query.onSnapshot(callback);
window.deleteDoc = (docRef) => docRef.delete();
window.doc = (collectionName, docId) => db.collection(collectionName).doc(docId);
window.updateDoc = (docRef, data) => docRef.update(data);
window.setDoc = (docRef, data) => docRef.set(data);
</script>

<script src="js/script.js"></script>

<!-- Event Popup -->
<div id="eventPopup" class="event-popup hidden">
  <div class="event-box">
    <p id="eventText"></p>

    <div class="event-actions">
      <button id="editEventBtn">Bearbeiten</button>
      <button id="deleteEventBtn">Löschen</button>
      <button onclick="closePopup()">Schließen</button>
    </div>
  </div>
</div>

<script>
// Initalisiere Tools nach Delay
setTimeout(() => {
  if (window.loadTodos) {
    console.log("loadTodos wird aufgerufen...");
    loadTodos();
  }
  if (window.loadEvents) {
    console.log("loadEvents wird aufgerufen...");
    loadEvents();
  }
}, 200);
</script>
</html>
