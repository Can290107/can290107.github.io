<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unsere Tools ❤️</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Unsere kleinen Tools ❤️</h1>

<!-- Zurück Button -->
<button onclick="goBack()">⬅ Zurück</button>

<!-- Kalender -->
<section>
  <h2>Kalender 📅</h2>

  <div class="calendar">
    <div class="calendar-header">
  <button class="arrow-btn" onclick="changeMonth(-1)">‹</button>
  <h3 id="calendarTitle"></h3>
  <button class="arrow-btn" onclick="changeMonth(1)">›</button>
</div>

    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</section>

<!-- ToDo -->
<section>
  <h2>Unsere Liste ❤️</h2>

  <div class="todo-container">
  <div class="todo-input-row">
    <input type="text" id="todoInput" placeholder="Neue Idee...">
    <button onclick="addTodo()">＋</button>
  </div>

  <ul id="todoList" class="todo-list"></ul>
</div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyGJQTZGjNqoHsjcEJ1W1DHryoXS-xpeOuVI",
  authDomain: "geburtstag-seite.firebaseapp.com",
  projectId: "geburtstag-seite",
  storageBucket: "geburtstag-seite.firebasestorage.app",
  messagingSenderId: "825693028407",
  appId: "1:825693028407:web:55ebde2398f2f9cc907fb2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// GLOBAL machen
window.db = db;
window.firebaseFns = {
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  updateDoc,
  setDoc
};

const script = document.createElement("script");
script.src = "js/script.js";

script.onload = () => {
  console.log("Script geladen ✅");

  if(window.loadTodos){
    loadTodos();
  }

  if(window.loadEvents){
    loadEvents();
  }
};

document.body.appendChild(script);

</script>
<div id="eventPopup" class="event-popup hidden">
  <div class="event-box">
    <p id="eventText"></p>

    <div class="event-actions">
      <button id="editEventBtn">Bearbeiten</button>
      <button id="deleteEventBtn">Löschen</button>
      <button onclick="closePopup()">Schließen</button>
    </div>
  </div>
</div>
</body>
</html>
