<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unsere Tools ❤️</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">

<!-- Firebase SDK (Compat Version) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<!-- Zentrale Firebase-Konfiguration -->
<script src="js/firebase-config.js"></script>

</head>

<body class="private-page auth-pending">

<nav class="navbar">
  <h2>❤️</h2>
  <div class="navbar-actions">
    <button onclick="window.goBack ? window.goBack() : window.location.href='index.html'">← Zurück</button>
    <button onclick="window.openGallery ? window.openGallery() : window.location.href='gallery.html'">Momente</button>
  </div>
</nav>



<!-- Kalender -->
<section>
  <h2>Kalender 📅</h2>

  <div class="calendar">
    <div class="calendar-header">
  <button class="arrow-btn" onclick="changeMonth(-1)">‹</button>
  <h3 id="calendarTitle"></h3>
  <button class="arrow-btn" onclick="changeMonth(1)">›</button>
</div>

    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</section>

<!-- ToDo -->
<section>
  <h2>Unsere Liste ❤️</h2>

  <div class="todo-container">
  <div class="todo-input-row">
    <input type="text" id="todoInput" placeholder="Neue Idee...">
    <button onclick="addTodo()">＋</button>
  </div>

  <ul id="todoList" class="todo-list"></ul>
</div>
</section>

<section>
  <h2>Galerie Upload ☁️</h2>
  <p>Monatsordner direkt in Firebase Storage hochladen.</p>
  <button onclick="openUpload()">Upload öffnen</button>
</section>

<script src="js/script.js"></script>

<!-- Event Popup -->
<div id="eventPopup" class="event-popup hidden">
  <div class="event-box">
    <p id="eventText"></p>

    <div class="event-actions">
      <button id="editEventBtn">Bearbeiten</button>
      <button id="deleteEventBtn">Löschen</button>
      <button onclick="closePopup()">Schließen</button>
    </div>
  </div>
</div>

</body>
</html>
