<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unsere Momente ❤️</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Firebase SDK (Compat Version) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<!-- Zentrale Firebase-Konfiguration -->
<script src="js/firebase-config.js"></script>

</head>

<body class="private-page auth-pending">
  <nav class="navbar">
    <h2>❤️</h2>
    <div class="navbar-actions">
      <button onclick="goBack()">← Zurück</button>
      <button onclick="openTools()">Tools</button>
      <button onclick="openUpload()">Upload</button>
      <button class="logout-btn" onclick="handleLogout()">Abmelden</button>
    </div>
  </nav>

  <main class="gallery-page">
    <section class="memory-gallery-section">
      <p class="gallery-kicker">Unsere Momente</p>
      <h1>Monat für Monat</h1>
      <p class="gallery-intro">
        Eine ganz eigene Galerie nur für uns
      </p>

      <div class="gallery-toolbar">
        <div id="galleryMonthTabs" class="gallery-month-tabs" aria-label="Monate auswählen"></div>
        <p id="gallerySummary" class="gallery-summary"></p>
      </div>

      <div id="galleryGrid" class="gallery-grid" aria-live="polite"></div>

      <div id="galleryEmptyState" class="gallery-empty hidden">
        <h3>Noch keine Erinnerungen für diesen Monat</h3>
        <p>Hier erscheinen deine Fotos und Videos, sobald für diesen Monat etwas hochgeladen wurde.</p>
      </div>
    </section>
  </main>

  <div id="mediaLightbox" class="media-lightbox hidden" role="dialog" aria-modal="true" aria-labelledby="mediaLightboxCaption">
    <div class="media-lightbox-panel">
      <button class="media-lightbox-close" type="button" onclick="closeMediaLightbox()" aria-label="Ansicht schließen">✕</button>
      <div id="mediaLightboxContent" class="media-lightbox-content"></div>
      <p id="mediaLightboxCaption" class="media-lightbox-caption"></p>
      <div class="media-lightbox-actions">
        <button id="deleteGalleryItemBtn" class="media-lightbox-delete hidden" type="button" onclick="deleteActiveGalleryItem()">Datei löschen</button>
      </div>
    </div>
  </div>

  <script src="js/gallery-data.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
